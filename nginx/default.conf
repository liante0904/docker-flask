server {
    # HTTP -> HTTPS 리다이렉트
    listen 80;
    server_name ssh-oci.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ssh-oci.duckdns.org;

    # 이 경로가 certbot이 자동으로 갱신하는 파일 경로입니다.
    ssl_certificate /etc/letsencrypt/live/ssh-oci.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ssh-oci.duckdns.org/privkey.pem;

    # 보안 및 프록시 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    location / {
        proxy_pass http://flask:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /app/static/;
        expires 30d;
    }
}
